<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "MyriadPro";
        src:
          url("../public/fonts/MyriadPro/MyriadProRegular/MyriadProRegular.woff")
            format("woff"),
          url("../public/fonts/MyriadPro/MyriadProRegular/MyriadProRegular.ttf")
            format("truetype");
        font-style: normal;
        font-weight: 400;
      }
      @font-face {
        font-family: "MyriadPro";
        src:
          url("../public/fonts/MyriadPro/MyriadProItalic/MyriadProItalic.woff")
            format("woff"),
          url("../public/fonts/MyriadPro/MyriadProItalic/MyriadProItalic.ttf")
            format("truetype");
        font-style: italic;
        font-weight: 400;
      }
      @font-face {
        font-family: "MyriadPro";
        src:
          url("../public/fonts/MyriadPro/MyriadProSemiBold/MyriadProSemiBold.woff")
            format("woff"),
          url("../public/fonts/MyriadPro/MyriadProSemiBold/MyriadProSemiBold.ttf")
            format("truetype");
        font-style: normal;
        font-weight: 600;
      }
      @font-face {
        font-family: "MyriadPro";
        src:
          url("../public/fonts/MyriadPro/MyriadProBold/MyriadProBold.woff")
            format("woff"),
          url("../public/fonts/MyriadPro/MyriadProBold/MyriadProBold.ttf")
            format("truetype");
        font-style: normal;
        font-weight: 700;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #000000;
      }
      body {
        color: #ffffff;
        font-family: "MyriadPro", Arial, Helvetica, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        white-space: pre-wrap;
        text-align: center;
        font-size: 5vw;
        padding: 2vw;
        overflow: hidden;
        /* Vypneme všechny systémové scroll/zoom akce a animace */
        -webkit-user-select: none;
        user-select: none;
        cursor: none;
      }
      #content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        opacity: 1;
        /* GPU akcelerace – plynulý fade bez ohledu na CPU zátěž */
        will-change: opacity;
        transform: translateZ(0);
        backface-visibility: hidden;
        transition: opacity 0.5s ease-in-out;
      }
      #content.blackout {
        opacity: 0;
      }
      .divider {
        border-top: 1px solid #444;
        width: 80%;
        margin: 2vh 0;
      }
      .sequence {
        font-size: 0.8vw;
        color: #888;
        font-weight: 600;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 0 2vw;
      }
      .title-row {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 0 2vw;
      }
      .text-block {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        min-height: 0;
        min-width: 0;
        width: 100%;
      }
      .text-fit {
        white-space: pre-wrap;
        text-align: center;
        transform-origin: center center;
        max-width: 100%;
        font-weight: 600;
      }
      .text-fit.text-justify {
        text-align: justify;
        text-justify: inter-word;
        padding: 0 4vw;
      }
      .text-fit.text-italic {
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="content"></div>
    <script>
      const { ipcRenderer } = require("electron");

      function fitContent() {
        const fits = document.querySelectorAll(".text-fit");
        fits.forEach((el) => {
          el.style.transform = "";
        });
        requestAnimationFrame(() => {
          fits.forEach((el) => {
            const parent = el.parentElement;
            if (!parent) return;
            const pw = parent.clientWidth;
            const ph = parent.clientHeight;
            const w = el.scrollWidth;
            const h = el.scrollHeight;
            if (!pw || !ph || !w || !h) return;
            const scale = Math.min(pw / w, ph / h, 1);
            if (scale < 1) {
              el.style.transform = "scale(" + scale + ")";
            }
          });
        });
      }

      ipcRenderer.on("hdmi-update", (_, html) => {
        document.getElementById("content").innerHTML = html;
        fitContent();
      });

      ipcRenderer.on("hdmi-blackout", (_, active) => {
        const el = document.getElementById("content");
        if (active) el.classList.add("blackout");
        else el.classList.remove("blackout");
      });

      window.addEventListener("resize", fitContent);
    </script>
  </body>
</html>
